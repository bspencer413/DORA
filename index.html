// Name normalization -- strips middle names/initials for Wikipedia lookup
function normalizeForWiki(name) {
  if (!name) return name;
  name = name.trim();
  // Handle "Last, First" format
  if (name.indexOf(',') > -1) {
    var parts = name.split(',');
    name = parts[1].trim() + ' ' + parts[0].trim();
  }
  var words = name.split(/\s+/);
  // Remove single-letter words (middle initials) and words ending in period
  var filtered = words.filter(function(w) {
    return w.length > 1 && w.indexOf('.') === -1;
  });
  // Keep first and last only if 3+ words after filtering
  var result = filtered.length >= 2 ? filtered[0] + ' ' + filtered[filtered.length - 1] : filtered.join(' ');
  return result.replace(/\w\S*/g, function(txt) { return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase(); });
}

function toTitleCase(str) {
  if (!str) return str;
  return str.replace(/\w\S*/g, function(txt) { return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase(); });
}

function isDeceasedCheck(extract, description, deathDate, type) {
  if (type === 'disambiguation') return false;
  if (deathDate) return true;
  var first = extract ? extract.split('.')[0] : '';
  if (/\(\d{4}\s*[-\u2013\u2014]+\s*\d{4}\)/.test(first)) return true;
  if (/\(\d{4}\s*[-\u2013\u2014]+\s*\d{4}\)/.test(description)) return true;
  if (/\([^)]*born\s+\w+\s+\d+,\s+\d{4}\)/.test(first)) return false;
  if (/\b(died|death|passed away|deceased)\b/i.test(extract)) return true;
  if (/\b(died|death|deceased)\b/i.test(description)) return true;
  return false;
}
