const toTitleCase = (str) => {
if (!str) return str;
return str.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substr(1).toLowerCase()).replace(/’\w/g, t => t.toUpperCase());
};

const normalizeForWiki = (name) => {
if (!name) return name;
name = name.trim();
if (name.indexOf(’,’) > -1) { const p = name.split(’,’); name = p[1].trim() + ’ ’ + p[0].trim(); }
const words = name.split(/\s+/).filter(w => w.replace(/./g,’’).length > 1);
if (words.length >= 3) return toTitleCase(words[0] + ’ ’ + words[words.length-1]);
return toTitleCase(words.join(’ ’));
};

const addInitialPeriods = (name) => {
if (!name) return name;
return name.trim().split(/\s+/).map((w,i,arr) => (w.length===1 && /[A-Za-z]/.test(w) && i>0 && i<arr.length-1) ? w+’.’ : w).join(’ ’);
};

// BUG H: “Bert” must NOT match “Bertha” — exact or search-longer-than-result only
const firstNameMatches = (resultFirst, searchFirst) => {
if (!searchFirst) return true;
const r = (resultFirst||’’).toUpperCase().trim();
const s = searchFirst.toUpperCase().trim();
if (r === s) return true;
if (s.length > r.length && s.startsWith(r)) return true;
return false;
};

// BUG C/I: correct name assembly — First [Middle] Last [Suffix]
const buildFullNameFromParts = (nwName, nwMiddle, nwSuffix) => {
const parts = (nwName||’’).trim().split(/\s+/).filter(Boolean);
const first = parts[0]||’’;
const last = parts.length > 1 ? parts[parts.length-1] : ‘’;
const out = [first];
if (nwMiddle && nwMiddle.trim()) out.push(nwMiddle.trim());
if (last && last !== first) out.push(last);
if (nwSuffix && nwSuffix.trim()) out.push(nwSuffix.trim());
return out.filter(Boolean).join(’ ’);
};

// BUG B: has someone passed based on SSDI record
const likelyPassed = (r) => {
if (r.death_date) return true;
const by = r.birth_date ? parseInt((r.birth_date.split(’/’).pop()||’’).trim()) : null;
return !!(by && by < 1920);
};

// BUG D: watchlist collision check with middle-name awareness
const namesCollide = (storedName, searchName, searchMiddle) => {
const sn = (storedName||’’).toLowerCase().trim();
const se = (searchName||’’).toLowerCase().trim();
if (sn === se) return true;
const snP = sn.split(/\s+/), seP = se.split(/\s+/);
if (snP[0] !== seP[0] || snP[snP.length-1] !== seP[seP.length-1]) return false;
const snMid = snP.length === 3 ? snP[1] : ‘’;
const seMid = (searchMiddle||’’).toLowerCase().replace(’.’,’’).trim();
if (!snMid && !seMid) return true;
if (snMid && seMid) return snMid.startsWith(seMid) || seMid.startsWith(snMid);
return false;
};

// Scoring — middle worth 30 pts so first+mid+last = 90 = Probable
const scoreResult = (result, sFirst, sMiddle, sLast, sBirthYear, sSuffix) => {
let score = sFirst ? 30 : 50;
const rFirst = (result.first_name||’’).toUpperCase();
const rMiddle = (result.middle_name||’’).toUpperCase();
const rLast = (result.last_name||’’).toUpperCase();
const rSuffix = (result.suffix||’’).toUpperCase();
const rDob = result.birth_date||’’;
const sf = (sFirst||’’).toUpperCase();
const sm = (sMiddle||’’).toUpperCase().replace(’.’,’’);
const sl = (sLast||’’).toUpperCase();
const sx = (sSuffix||’’).toUpperCase();
if (sf) { if (rFirst===sf) score+=30; else if (firstNameMatches(rFirst,sf)) score+=15; }
if (sm && rMiddle && (rMiddle===sm||rMiddle.startsWith(sm)||sm.startsWith(rMiddle))) score+=30;
if (sBirthYear && rDob && rDob.includes(sBirthYear)) score+=15;
if (sx && rSuffix && rSuffix===sx) score+=5;
return score;
};

function isDeceasedCheck(extract,description,deathDate,type) {
if (type===‘disambiguation’) return false;
if (deathDate) return true;
const fs = extract ? extract.split(’.’)[0] : ‘’;
const hasDeathInBrackets = /(\d{4}\s*[-\u2013\u2014]+\s*\d{4})/.test(fs);
const hasYearsInDesc = /(\d{4}\s*[-\u2013\u2014]+\s*\d{4})/.test(description);
const hasBornOnly = /([^)]*born\s+\w+\s+\d+,\s+\d{4})/.test(fs);
if (hasBornOnly && !hasDeathInBrackets && !hasYearsInDesc) return false;
const isPastTense = /^[^.]*\bwas (an?|the)\b[^.]*./.test(extract) && !/([^)]*born/.test(fs) && !/born\s+\d{4}/.test(description);
const diedInExtract = /\b(died|death|passed away|deceased|d.)\b/i.test(extract);
const diedInDesc = /\b(died|death|deceased)\b/i.test(description);
const yearRangeInDesc = /(\d{4}[-\u2013\u2014]+\d{4})/.test(description);
return hasDeathInBrackets||hasYearsInDesc||yearRangeInDesc||isPastTense||diedInExtract||diedInDesc;
}

const fetchWikiAction=async(name)=>{
try{
const params=new URLSearchParams({action:‘query’,titles:name,prop:‘extracts|pageprops|categories|info’,exintro:‘true’,explaintext:‘true’,redirects:‘1’,cllimit:‘50’,format:‘json’,origin:’*’});
const data=await(await fetch(‘https://en.wikipedia.org/w/api.php?’+params)).json();
const pages=data.query&&data.query.pages?data.query.pages:{};
const pg=Object.values(pages)[0];
if(!pg||pg.missing!==undefined)return null;
const title=pg.title||name, extract=pg.extract||’’;
const categories=(pg.categories||[]).map(c=>c.title||’’);
const deathFromCat=categories.some(c=>/deaths|murdered|executed/i.test(c));
const isDisambig=!!(pg.pageprops&&pg.pageprops.disambiguation!==undefined)||title.toLowerCase().includes(’(disambiguation)’);
if(isDisambig)return{type:‘disambiguation’,isDisambiguation:true,title:title.replace(/ (disambiguation)/i,’’),extract,matches:[]};
let thumbnail=null,birthDate=null,deathDate=null,description=’’;
try{
const sum=await(await fetch(‘https://en.wikipedia.org/api/rest_v1/page/summary/’+encodeURIComponent(title))).json();
thumbnail=sum.thumbnail?sum.thumbnail.source:null;birthDate=sum.birth_date||null;deathDate=sum.death_date||null;description=sum.description||’’;
}catch(e){}
if(!deathDate||deathDate.length<=4){
const months=‘January|February|March|April|May|June|July|August|September|October|November|December’;
const dm=extract.match(new RegExp(’(?:’+months+’) [0-9]{1,2}, [0-9]{4}’,‘g’));
if(dm&&dm.length>=2)deathDate=dm[dm.length-1];
else if(dm&&dm.length===1&&/died|death|passed|\u2013|\u2014/.test(extract.split(’.’)[0]))deathDate=dm[0];
}
if(deathDate&&!deathFromCat){const ym=String(deathDate).match(/\d{4}/);if(ym){const yr=parseInt(ym[0]);if(yr<1900||yr>2030)deathDate=null;}}
const deceased=deathFromCat||!!deathDate||isDeceasedCheck(extract,description,deathDate,‘standard’);
return{title,extract,thumbnail,birthDate,deathDate:deceased?(deathDate||‘deceased’):null,description,isDisambiguation:false,deathFromCategory:deathFromCat};
}catch(e){return null;}
};

const fetchDisambigMatches=async(title)=>{
try{
const data=await(await fetch(‘https://en.wikipedia.org/w/api.php?action=parse&page=’+encodeURIComponent(title)+’&prop=links&format=json&origin=*’)).json();
const links=(data.parse&&data.parse.links)?data.parse.links:[];
const personLinks=links.filter(l=>l.ns===0&&l[’*’]&&l[’*’].length>2).map(l=>l[’*’]).slice(0,20);
const results=[];
const searchLast=title.trim().split(/\s+/).pop().toUpperCase();
for(const link of personLinks){
const profile=await fetchWikiAction(link);
if(!profile||profile.isDisambiguation||!profile.extract)continue;
const linkLast=profile.title?profile.title.trim().split(/\s+/).pop().toUpperCase():’’;
if(searchLast.length>2&&linkLast!==searchLast)continue;
const desc=(profile.description||’’).toLowerCase(), ext=(profile.extract||’’).toLowerCase();
if(!profile.birthDate&&!profile.deathDate&&!/\b(born|died|american|british|politician|actor|actress|singer|musician|athlete|author|writer|director|businessman|scientist|lawyer|doctor|physician|soldier|general|president|senator|governor|mayor)\b/.test(desc+’ ’+ext))continue;
results.push(profile);
if(results.length>=6)break;
}
return results;
}catch(e){return[];}
};

const fetchWikiProfile=async(name)=>{
try{
const n2=addInitialPeriods(toTitleCase(name));
let result=null;
try{result=await fetchWikiAction(n2);}catch(e){}
if(!result&&n2!==toTitleCase(name))try{result=await fetchWikiAction(toTitleCase(name));}catch(e){}
if(!result)return{isDisambiguation:false,notFound:true};
if(result.type===‘disambiguation’){let m=[];try{m=await fetchDisambigMatches(result.title);}catch(e){}return{isDisambiguation:true,title:result.title||name,matches:m||[]};}
return result;
}catch(e){return{isDisambiguation:false,notFound:true};}
};

const checkWatch=async()=>{
const name=toTitleCase((nw.name||’’).trim().replace(/\s+/g,’ ‘));
if(!name||name.length<2){alert(‘Please enter a name to search.’);return;}
setSsdiDrawer(null);setSsdiPage(1);
setWatchlistChecking(true);setWatchlistCheck(null);setWatchlistChecked(false);
try{
const nameParts=nw.name.trim().split(/\s+/);
const firstName=nameParts[0], lastName=nameParts[nameParts.length-1];
const ssdiName=firstName===lastName?firstName:(firstName+’ ‘+lastName).trim();
const params=new URLSearchParams({name:ssdiName});
if(nw.birthYear)params.append(‘birth_year’,nw.birthYear);
const [ssdiResp,wikiResp]=await Promise.allSettled([
fetch(API_BASE+’/ssdi/search?’+params.toString(),{headers:authH()}).then(r=>r.ok?r.json():{results:[],has_more:false}).catch(()=>({results:[],has_more:false})),
fetchWikiProfile(name).catch(()=>({isDisambiguation:false,notFound:true}))
]);
const ssdiRaw=ssdiResp.status===‘fulfilled’?(ssdiResp.value.results||[]):[];
// BUG H: filter Bertha-type mismatches
const ssdiFiltered=ssdiRaw.filter(r=>firstNameMatches(r.first_name||’’,firstName));
const ssdiResults=ssdiFiltered.map(r=>({…r,_score:scoreResult(r,firstName,nw.middle,lastName,nw.birthYear,nw.suffix)}))
.sort((a,b)=>{
if(b._score!==a._score)return b._score-a._score;
const ay=a.birth_date?parseInt(a.birth_date.split(’/’).pop()):9999;
const by2=b.birth_date?parseInt(b.birth_date.split(’/’).pop()):9999;
return ay-by2;
});
if(ssdiResults.length===1)ssdiResults[0]._score=95;
const profile=wikiResp.status===‘fulfilled’?(wikiResp.value||{isDisambiguation:false,notFound:true}):{isDisambiguation:false,notFound:true};
setWatchlistCheck({profile,name,ssdiResults});setWatchlistChecked(true);
}catch(e){setWatchlistCheck({profile:{isDisambiguation:false,notFound:true},name:toTitleCase(nw.name),ssdiResults:[]});setWatchlistChecked(true);}
finally{setWatchlistChecking(false);}
};

                <div className="mt-3 space-y-3">

                      <button onClick={doDeleteAccount} className="w-full py-3 bg-red-700 text-white rounded-lg font-bold">Yes, Permanently Delete My Account</button>
                      <button onClick={()=>{setShowDeleteConfirm(false);setShowDangerZone(false);}} className="w-full py-3 bg-gray-800 border border-gray-600 text-gray-300 rounded-lg font-medium">Cancel</button>
                    </div>
                  }
                </div>
              )}
            </div>
          </div>
        </div>
        <div className={cardClass}>
          <h3 className="font-bold text-white mb-1">Privacy Policy</h3>
          <p className="text-gray-400 text-xs mb-3">Last updated: March 17, 2026</p>
          <div className="space-y-3 text-gray-200 text-sm leading-relaxed">
            <p><strong className="text-white">Information We Collect:</strong> Your email address, watchlist names, search queries, and anonymous usage data.</p>
            <p><strong className="text-white">How We Use It:</strong> We do not sell your personal information. Ever.</p>
            <p><strong className="text-white">Data Sources:</strong> Search results are powered by Legacy obituary feeds and Wikipedia.</p>
            <p><strong className="text-white">Your Rights:</strong> You may delete your account and all data from this page at any time.</p>
            <a href="mailto:bspencer413@me.com" className="text-red-400">bspencer413@me.com</a>
          </div>
        </div>
        <p className="text-white/30 text-center text-xs pb-4">v{APP_VERSION}</p>
      </div>
    )}

  </div>

  <div style={{position:'fixed',bottom:0,left:0,right:0,backgroundColor:'rgba(10,0,0,0.95)',backdropFilter:'blur(8px)',borderTop:'1px solid #7f1d1d',padding:'0.5rem 1rem',paddingBottom:'max(0.5rem, env(safe-area-inset-bottom))'}}>
    <div className="flex justify-around max-w-sm mx-auto">
      <button onClick={()=>setPage('watchlist')} className={'flex flex-col items-center gap-0.5 px-1 py-1 '+(page==='watchlist'?'text-red-500':'text-gray-400')}><HeartIcon/><span className="text-xs font-medium">Watchlist</span></button>
      <button onClick={()=>{clearWatchlistCheck();setPage('search');}} className={'flex flex-col items-center gap-0.5 px-1 py-1 '+(page==='search'?'text-red-500':'text-gray-400')}><SearchIcon/><span className="text-xs font-medium">Search</span></button>
      <button onClick={()=>setPage('memories')} className={'flex flex-col items-center gap-0.5 px-1 py-1 '+(page==='memories'?'text-red-500':'text-gray-400')}><svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><span className="text-xs font-medium">Memories</span></button>
      <button onClick={()=>setPage('about')} className={'flex flex-col items-center gap-0.5 px-1 py-1 '+(page==='about'?'text-red-500':'text-gray-400')}><InfoIcon/><span className="text-xs font-medium">Info</span></button>
      <button onClick={()=>setPage('notifications')} className={'flex flex-col items-center gap-0.5 px-1 py-1 relative '+(page==='notifications'?'text-red-500':'text-gray-400')}><BellIcon red={unreadCount>0}/>{unreadCount>0&&<span className="absolute top-0 right-1 bg-red-600 text-white text-xs font-bold rounded-full w-4 h-4 flex items-center justify-center">{unreadCount>9?'9+':unreadCount}</span>}<span className="text-xs font-medium" style={unreadCount>0?{color:'#dc2626'}:{}}> Alerts</span></button>
    </div>
    <p className="text-center text-gray-600 text-xs mt-1">app v{APP_VERSION} | api v{apiVersion}</p>
